name: Release jax_memory_monitor

on:
  push:
    tags:
      - 'jax_memory_monitor-v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Run tests
        run: |
          cd jax_memory_monitor
          uv pip install pytest
          uv run pytest tests/test_main.py

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Build package
        run: |
          cd jax_memory_monitor
          uv build
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/jax_memory_monitor-v')
        run: |
          cd jax_memory_monitor
          uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-release@v2
        if: startsWith(github.ref, 'refs/tags/jax_memory_monitor-v')
        with:
          files: jax_memory_monitor/dist/*
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
